name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Build and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

      - name: Build Cloudflare Worker bundle
        run: npm run cf:build
